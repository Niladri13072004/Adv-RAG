services:
  - type: web
    name: adv-rag
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt google-genai groq streamlit
    startCommand: python -c "import os, main; main.demo.launch(server_name='0.0.0.0', server_port=int(os.environ.get('PORT', 10000)))"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
